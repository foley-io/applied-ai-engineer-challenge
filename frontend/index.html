<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Foley Compliance Reviewer</title>
  <style>
    body { font-family: system-ui; max-width: 720px; margin: 2rem auto; padding: 1rem; }
    textarea { width: 100%; height: 120px; }
    pre { background: #f4f4f4; padding: 1rem; white-space: pre-wrap; }
  </style>
</head>
<body>
  <h1>Foley Compliance Reviewer</h1>
  <p>Reviewer console — for internal use only.</p>

  <label>Driver ID: <input id="driver" value="D-1042"></label>
  <br><br>
  <textarea id="request" placeholder="What do you want to know?"></textarea>
  <br>
  <button onclick="runReview()">Run review</button>

  <h2>Result</h2>
  <pre id="result"></pre>

  <script src="app.js"></script>
</body>
</html>
