name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        run: git diff origin/${{ github.base_ref }}...HEAD > pr_diff.txt

      - name: Run Claude review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          pip install anthropic -q
          python3 << 'EOF'
          import anthropic
          import os
          import subprocess

          with open('pr_diff.txt', 'r') as f:
              diff = f.read()[:60000]  # truncate very large diffs

          if not diff.strip():
              print("Empty diff, skipping review.")
              exit(0)

          client = anthropic.Anthropic()
          message = client.messages.create(
              model="claude-sonnet-4-6",
              max_tokens=1500,
              messages=[{
                  "role": "user",
                  "content": (
                      "You are a senior code reviewer. Review the following pull request diff "
                      "and provide advisory feedback on: code quality, potential bugs, security "
                      "concerns, and best practices. Be concise and actionable. "
                      "Format your response as markdown with clear sections. "
                      "Note: this is advisory only — do not suggest blocking the merge.\n\n"
                      f"Diff:\n```\n{diff}\n```"
                  )
              }]
          )

          review = message.content[0].text
          body = (
              "## Claude Code Review (Advisory)\n"
              "> These comments are informational only and do not block merging.\n\n"
              + review
          )

          subprocess.run([
              "gh", "pr", "comment", os.environ["PR_NUMBER"],
              "--body", body
          ], check=True)
          EOF
